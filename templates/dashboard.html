<!DOCTYPE html>
<html>
<head>
    <title>NetTool Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div style="font-weight: 800; color: var(--accent);">NETTOOL // OPS</div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <span style="font-size: 0.8rem;">USER: {{ user }}</span>
            <a href="{{ url_for('logout') }}"><button style="width: auto; padding: 5px 15px; font-size: 0.7rem;">LOGOUT</button></a>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="tool-section">
            <div class="centered-input-container">
                <h3>Network Diagnostic Tool</h3>
                <p style="color: var(--text-secondary); font-size: 0.85rem;">Perform ICMP ping and DNS resolution.</p>
                
                <form method="POST">
                    <input type="text" name="target" placeholder="Enter Hostname or IP Address" value="{{ target }}" required>
                    <button type="submit">EXECUTE TEST</button>
                </form>

                {% if dns_info %}
                <div class="dns-badge">{{ dns_info }}</div>
                {% endif %}
            </div>

            {% if output %}
            <div class="terminal">{{ output }}</div>
            {% endif %}
        </div>

        <div class="history-card" style="background: var(--bg-panel); padding: 1.5rem; border-radius: 12px;">
            <h4 style="margin-top: 0; font-size: 0.75rem; color: var(--text-secondary);">PROFILE ACTIVITY</h4>
            {% for entry in history %}
            <div class="history-item">
                <span>{{ entry.target }}</span>
                <span style="color: {{ '#4ade80' if entry.status == 'Success' else '#ef4444' }}">{{ entry.status }}</span>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
