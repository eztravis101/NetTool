<!DOCTYPE html>
<html>
<head>
    <title>NetTool | Secure Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card fade-in">
            <h2 style="text-align: center; margin-bottom: 0.5rem;">NETTOOL <span style="font-weight: 200;">ACCESS</span></h2>
            <p style="text-align: center; color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 2rem;">Please authenticate to reach the dashboard.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ 'error' if category == 'error' else 'success' }}">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label>Operator Username</label>
                    <input type="text" name="username" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>System Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit">AUTHENTICATE</button>
            </form>

            <div style="margin-top: 1.5rem; text-align: center; font-size: 0.85rem;">
                <span style="color: var(--text-secondary);">Unauthorized?</span> 
                <a href="{{ url_for('register') }}" style="color: var(--accent); text-decoration: none; font-weight: 700;">Create Profile</a>
            </div>
        </div>
    </div>
</body>
</html>
