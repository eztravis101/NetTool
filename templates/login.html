<!DOCTYPE html>
<html>
<head>
    <title>NetTool | Log In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2 style="margin-bottom: 2rem; letter-spacing: 2px;">NETTOOL</h2>
            {% with messages = get_flashed_messages() %}
              {% if messages %}{% for m in messages %}<p style="color: #ef4444; font-size: 0.8rem;">{{ m }}</p>{% endfor %}{% endif %}
            {% endwith %}
            <form method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">LOG IN</button>
            </form>
            <p style="font-size: 0.8rem; margin-top: 1.5rem; color: var(--text-secondary);">
                New operator? <a href="{{ url_for('register') }}" style="color: var(--accent); text-decoration: none;">Sign Up</a>
            </p>
        </div>
    </div>
</body>
</html>
