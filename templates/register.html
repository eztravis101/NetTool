<!DOCTYPE html>
<html>
<head>
    <title>NetTool | Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2 style="margin-bottom: 2rem; letter-spacing: 2px;">SIGN UP</h2>
            <form method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">CREATE ACCOUNT</button>
            </form>
            <p style="font-size: 0.8rem; margin-top: 1.5rem; color: var(--text-secondary);">
                Existing user? <a href="{{ url_for('login') }}" style="color: var(--accent); text-decoration: none;">Log In</a>
            </p>
        </div>
    </div>
</body>
</html>
